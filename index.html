<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clifford1one</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Barlow+Condensed:wght@900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#f5f2eb;
  --ink:#0d0d0d;
  --dim:#aaa;
  --slot-bg:#0a0a14;
  --cyan:#00e5ff;
  --yellow:#ffe000;
  --red:#ff1a3c;
  --green:#00ff66;
  --pix:'Press Start 2P',monospace;
}

body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  min-height:100vh;
  overflow-x:hidden;
}

.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:.8rem 2rem;
  border-bottom:1.5px solid var(--ink);
  font-family:var(--pix);font-size:7px;letter-spacing:1px;
}

.main{
  display:grid;
  grid-template-columns:1fr 300px;
  min-height:calc(100vh - 45px - 38px);
}

/* LEFT */
.links-col{
  padding:2rem 2rem 2rem 2.5rem;
  border-right:1.5px solid var(--ink);
  display:flex;flex-direction:column;justify-content:center;
}

.link-item{
  display:block;
  font-size:clamp(28px,5.5vw,76px);
  line-height:1.0;
  color:var(--ink);
  text-decoration:none;
  text-transform:uppercase;
  letter-spacing:-1px;
  padding:.12em 0;
  transition:opacity .15s,letter-spacing .2s;
}
.link-item:hover{opacity:.35;letter-spacing:3px;}

.link-item .tag{
  font-family:var(--pix);font-size:5.5px;font-weight:400;
  color:var(--dim);vertical-align:super;margin-left:8px;letter-spacing:1px;
}

.sep{height:1.5px;background:var(--ink);opacity:.1;margin:.6em 0;}

/* RIGHT */
.slot-col{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--slot-bg);
  padding:2rem 1.2rem;
  position:relative;overflow:hidden;
}
.slot-col::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.18) 3px,rgba(0,0,0,.18) 4px);
  z-index:1;
}

.slot-inner{position:relative;z-index:2;width:100%;max-width:240px;display:flex;flex-direction:column;gap:10px;}

.slot-label{font-family:var(--pix);font-size:7px;color:var(--yellow);text-align:center;letter-spacing:2px;}

/* MACHINE */
.machine{background:#0d0d20;border:3px solid var(--yellow);padding:12px;position:relative;}
.mc{position:absolute;width:9px;height:9px;background:var(--yellow);}
.mc.tl{top:-3px;left:-3px;} .mc.tr{top:-3px;right:-3px;}
.mc.bl{bottom:-3px;left:-3px;} .mc.br{bottom:-3px;right:-3px;}

/* REELS WINDOW */
.reels-wrap{
  background:#000;border:2px solid #222;
  padding:8px 6px;display:flex;gap:6px;justify-content:center;
  margin-bottom:8px;position:relative;
}
.reels-wrap::after{
  content:'';position:absolute;left:0;right:0;top:50%;height:2px;
  background:rgba(255,26,60,.45);transform:translateY(-50%);pointer-events:none;
}

.reel{width:60px;height:60px;background:#03030f;border:1.5px solid #1a1a2e;overflow:hidden;position:relative;flex-shrink:0;}
.reel-strip{position:absolute;top:0;left:0;width:100%;display:flex;flex-direction:column;}
.reel-cell{width:60px;height:60px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;user-select:none;}

/* INFO */
.info-row{display:flex;justify-content:space-between;font-family:var(--pix);font-size:5.5px;color:var(--cyan);padding:0 2px;margin-bottom:5px;}
.iv{color:var(--yellow);}

.sst{font-family:var(--pix);font-size:5.5px;text-align:center;min-height:11px;color:#444;letter-spacing:1px;}
.sst.win{color:var(--green);animation:gp .5s ease-in-out infinite alternate;}
.sst.lose{color:var(--red);}
@keyframes gp{to{text-shadow:0 0 8px var(--green);}}

.spin-btn{
  width:100%;background:var(--red);border:0;
  border-bottom:3px solid #7a000c;border-right:3px solid #7a000c;
  color:#fff;font-family:var(--pix);font-size:8px;
  padding:11px;cursor:pointer;letter-spacing:2px;
}
.spin-btn:hover:not(:disabled){filter:brightness(1.15);}
.spin-btn:active:not(:disabled){border-bottom-width:1px;border-right-width:1px;transform:translate(2px,2px);}
.spin-btn:disabled{background:#222;border-color:#111;color:#444;cursor:not-allowed;transform:none;}

/* CONFETTI */
#conf{position:fixed;inset:0;pointer-events:none;z-index:9999;display:none;}
#conf.on{display:block;}
.cp{position:absolute;animation:cf linear forwards;}
@keyframes cf{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(800deg);opacity:0;}}
@keyframes coinup{0%{transform:translateY(0) scale(1);opacity:1;}60%{transform:translateY(-80px) scale(1.3);}100%{transform:translateY(-150px) scale(.3);opacity:0;}}

#flash{position:fixed;inset:0;pointer-events:none;z-index:9998;background:rgba(255,224,0,.1);opacity:0;}
#flash.on{opacity:1;}

.bottombar{
  border-top:1.5px solid var(--ink);
  font-family:var(--pix);font-size:5.5px;color:var(--dim);
  padding:.65rem 2rem;display:flex;justify-content:space-between;letter-spacing:1px;
}

@media(max-width:680px){
  .main{grid-template-columns:1fr;grid-template-rows:auto auto;}
  .links-col{border-right:none;border-bottom:1.5px solid var(--ink);}
  .link-item{font-size:clamp(26px,9vw,52px);}
  .slot-col{min-height:400px;}
}
</style>
</head>
<body>

<div id="conf"></div>
<div id="flash"></div>

<div class="topbar">
  <span>CLIFFORD1ONE</span>
  <span style="color:var(--dim)">2026</span>
</div>

<div class="main">

  <!-- LINKS -->
  <div class="links-col">
    <a class="link-item" href="https://github.com/santiagoClifford" target="_blank" rel="noopener">SANTIAGOCLIFFORD<span class="tag">GITHUB</span></a>
    <a class="link-item" href="https://github.com/clifford1one" target="_blank" rel="noopener">CLIFFORD1ONE<span class="tag">GITHUB</span></a>
    <a class="link-item" href="https://github.com/clifford1one-corteEstudioso" target="_blank" rel="noopener">DOCUMENTACIÓN<span class="tag">GITHUB</span></a>
    <div class="sep"></div>
    <a class="link-item" href="https://youtube.com/@clifford1one" target="_blank" rel="noopener">CLIFFORD1ONE<span class="tag">YOUTUBE</span></a>
    <a class="link-item" href="https://instagram.com/clifford1one" target="_blank" rel="noopener">CLIFFORD1ONE<span class="tag">INSTAGRAM</span></a>
    <div class="sep"></div>
    <a class="link-item" href="https://editor.p5js.org/clifford1one/sketches" target="_blank" rel="noopener">CLIFFORD1ONE<span class="tag">P5.JS</span></a>
    <a class="link-item" href="https://www.crealitycloud.com/user-profile/2422989860/models" target="_blank" rel="noopener">2422989860<span class="tag">CREALITY</span></a>
  </div>

  <!-- SLOT -->
  <div class="slot-col">
    <div class="slot-inner">
      <div class="slot-label">★ CLIFFORD SLOTS ★</div>

      <div class="machine">
        <div class="mc tl"></div><div class="mc tr"></div>
        <div class="mc bl"></div><div class="mc br"></div>

        <div class="reels-wrap">
          <div class="reel"><div class="reel-strip" id="s0"></div></div>
          <div class="reel"><div class="reel-strip" id="s1"></div></div>
          <div class="reel"><div class="reel-strip" id="s2"></div></div>
        </div>

        <div class="info-row">
          <span>CRED <span class="iv" id="cred">10</span></span>
          <span>WIN <span class="iv" id="winv">0</span></span>
        </div>
        <div class="sst" id="st">PRESIONA SPIN</div>
      </div>

      <button class="spin-btn" id="sb" onclick="doSpin()">▶ SPIN ◀</button>
      <div class="slot-label" style="color:#2a2a3a;font-size:5px;">1 DE CADA 20 GANA</div>
    </div>
  </div>

</div>

<div class="bottombar">
  <span></span>
  <span>MADE WITH ♥ IN PIXEL</span>
</div>

<script>
const SYMS = ['🍒','🍋','🍊','⭐','💎','🔔','🍀','🎮'];
const CELL = 60;
const STRIP_LEN = 40; // number of cells in each strip
const LAND_IDX = 20;  // which cell index lands in the viewport
const WIN_P = 1/20;

let credits = 10, busy = false;

function buildStrips() {
  for (let i = 0; i < 3; i++) {
    const strip = document.getElementById('s' + i);
    strip.innerHTML = '';
    for (let j = 0; j < STRIP_LEN; j++) {
      const cell = document.createElement('div');
      cell.className = 'reel-cell';
      cell.textContent = SYMS[j % SYMS.length];
      strip.appendChild(cell);
    }
    posStrip(strip, 0);
  }
}

function posStrip(strip, cellIdx) {
  strip.style.transition = 'none';
  strip.style.top = -(cellIdx * CELL) + 'px';
}

function animStrip(strip, targetIdx, duration) {
  return new Promise(res => {
    // force layout before adding transition
    strip.getBoundingClientRect();
    strip.style.transition = `top ${duration}ms cubic-bezier(0.22,1,0.36,1)`;
    strip.style.top = -(targetIdx * CELL) + 'px';
    setTimeout(res, duration);
  });
}

buildStrips();

async function doSpin() {
  if (busy || credits <= 0) return;
  busy = true;
  credits--;
  document.getElementById('cred').textContent = credits;
  document.getElementById('winv').textContent = 0;
  const btn = document.getElementById('sb');
  const st = document.getElementById('st');
  btn.disabled = true;
  st.className = 'sst';
  st.textContent = '· · ·';

  const isWin = Math.random() < WIN_P;
  let res;
  if (isWin) {
    const s = SYMS[Math.floor(Math.random() * SYMS.length)];
    res = [s, s, s];
  } else {
    res = Array.from({length:3}, () => SYMS[Math.floor(Math.random() * SYMS.length)]);
    if (res[0] === res[1] && res[1] === res[2]) {
      res[2] = SYMS[(SYMS.indexOf(res[2]) + 1) % SYMS.length];
    }
  }

  // Set landing symbols and reset strips to top
  for (let i = 0; i < 3; i++) {
    const strip = document.getElementById('s' + i);
    strip.children[LAND_IDX].textContent = res[i];
    posStrip(strip, 0);
  }

  // Stagger animations
  const durations = [900, 1100, 1350];
  const delays   = [0,   140,  280];

  await Promise.all(durations.map((dur, i) =>
    new Promise(resolve => {
      setTimeout(() => {
        const strip = document.getElementById('s' + i);
        animStrip(strip, LAND_IDX, dur).then(resolve);
      }, delays[i]);
    })
  ));

  if (isWin) {
    const prize = 20;
    credits += prize;
    document.getElementById('cred').textContent = credits;
    document.getElementById('winv').textContent = prize;
    st.className = 'sst win';
    st.textContent = '★ JACKPOT! +' + prize + ' ★';
    celebrate();
  } else {
    st.className = 'sst lose';
    st.textContent = ['SIN SUERTE','OTRA VEZ','CASI...','SIGUE'][Math.floor(Math.random()*4)];
  }

  if (credits <= 0) {
    btn.textContent = 'GAME OVER';
  } else {
    btn.disabled = false;
  }
  busy = false;
}

function celebrate() {
  const flash = document.getElementById('flash');
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 280);

  const container = document.getElementById('conf');
  container.innerHTML = '';
  container.className = 'on';
  const cols = ['#ff1a3c','#ffe000','#00e5ff','#00ff66','#ff88ff','#ff8800','#fff'];
  for (let i = 0; i < 65; i++) {
    const d = document.createElement('div');
    d.className = 'cp';
    d.style.cssText = `left:${Math.random()*100}vw;top:-10px;width:${5+Math.random()*9}px;height:${5+Math.random()*9}px;background:${cols[i%cols.length]};animation-duration:${1.3+Math.random()*1.7}s;animation-delay:${Math.random()*0.6}s;`;
    container.appendChild(d);
  }

  const slotEl = document.querySelector('.slot-col');
  const r = slotEl.getBoundingClientRect();
  for (let i = 0; i < 8; i++) {
    const coin = document.createElement('div');
    coin.style.cssText = `position:fixed;left:${r.left+Math.random()*r.width}px;top:${r.top+r.height*.4}px;font-size:18px;z-index:10000;pointer-events:none;animation:coinup ${.6+Math.random()*.5}s ease-out ${Math.random()*.4}s forwards;`;
    coin.textContent = '🪙';
    document.body.appendChild(coin);
    setTimeout(() => coin.remove(), 1400);
  }

  setTimeout(() => { container.className=''; container.innerHTML=''; }, 3200);
}
</script>
</body>
</html>
